name: Bug report
description: Report a bug in one of the public NeoForge mods
title: "[mod-name] "
labels:
  - bug
body:
  - type: dropdown
    id: mod
    attributes:
      label: MOD
      description: Which mod is affected?
      options:
        - guide-lib
        - deconstructor
        - radial-teleport
        - good-sleep
        - elytra-slot
        - private-chest
        - nickname
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MOD version
      description: e.g. 1.0.0-beta.1
      placeholder: 1.0.0-beta.1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Minecraft / NeoForge
      description: e.g. Minecraft 26.1.2, NeoForge 26.1.2.76
      placeholder: Minecraft 26.1.2, NeoForge 26.1.2+
    validations:
      required: true

  - type: dropdown
    id: side
    attributes:
      label: Side
      options:
        - Client
        - Dedicated server
        - Both
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the bug happened?
      placeholder: |
        1. Install ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / crash report
      description: Paste relevant lines from latest.log or a crash report
      render: shell
