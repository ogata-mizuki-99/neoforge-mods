license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
Sleep in bed during the day to advance time. Optional health regen while sleeping and one-player night skip in multiplayer. Toggle each feature in mod config.

昼間睡眠・睡眠中 HP 回復・1 人夜スキップに対応。各機能は Mod 設定から個別に ON/OFF できます。
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
