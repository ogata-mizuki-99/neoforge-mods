license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
Adds an 81-slot private locker only the placing player can open. The top block shows an enlarged 3D render of the owner's skin head. Guide Lib integration for in-game manual (optional).

設置者のみ開けられる 81 スロットのプライベートロッカー。最上段にオーナーの 3D スキンヘッドを表示します。Guide Lib 連携でゲーム内マニュアル対応（任意）。
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="guide_lib"
    type="optional"
    versionRange="[1.0.0-beta.1,)"
    ordering="AFTER"
    side="BOTH"
