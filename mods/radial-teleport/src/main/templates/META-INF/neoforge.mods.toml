license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
Hold right-click with the Teleport Compass to open a radial menu. Jump to world spawn or online players — no operator permissions required. Guide Lib integration for in-game manual (optional).

テレポートコンパス長押しでピザ型 UI を表示。ワールドスポーンやオンラインプレイヤーへ移動できます（OP 不要）。Guide Lib 連携でゲーム内マニュアル対応（任意）。
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="nickname"
    type="optional"
    versionRange="[1.0.0-beta.1,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="guide_lib"
    type="optional"
    versionRange="[1.0.0-beta.1,)"
    ordering="AFTER"
    side="BOTH"
