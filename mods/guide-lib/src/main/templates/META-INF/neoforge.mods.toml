license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
Lightweight, data-driven in-game guide library for NeoForge 26.x.
Content mods add JSON under data/<modid>/guide/ — no hard dependency required.
Players browse all registered books from the Codex item (book + paper recipe).

Features: text / crafting / spotlight pages, book & tablet themes, per-mod Manual items via recipe components, optional JEI integration, /reload-friendly.

NeoForge 26.x 向けの軽量ガイド基盤 MOD。JSON のみでレシピ・使い方を Codex から参照できます。
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jei"
    type="optional"
    versionRange="[19.0.0,)"
    ordering="AFTER"
    side="CLIENT"
